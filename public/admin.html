<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ALIF Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #F0FDF4, #FFFFFF);
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Admin Login Section -->
    <section class="min-h-screen flex items-center justify-center">
        <div class="bg-white shadow-lg rounded-lg p-8 max-w-md w-full">
            <h1 class="text-2xl font-black text-alifTeal text-center mb-6">Admin Login</h1>
            <form class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="username" class="w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" class="w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none">
                </div>
                <button type="submit" class="bg-alifTeal text-white px-6 py-3 rounded-md hover:bg-alifYellow transition w-full">Login</button>
            </form>
        </div>
    </section>
</body>
</html>
