<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - ALIF Foundation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #194341 0%, #2CB770 100%);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .admin-card {
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.18);
      background: #ffffffcc;
      margin: 0 auto;
    }
    .admin-logo {
      font-family: 'Inter', sans-serif;
      letter-spacing: 2px;
      color: #194341;
    }
    .admin-btn {
      font-weight: 700;
      letter-spacing: 1px;
      background: #2CB770;
      color: #fff;
    }
    .admin-btn:hover {
      background: #FFCD28;
      color: #194341;
    }
    .admin-input:focus {
      border-color: #2CB770;
      box-shadow: 0 0 0 2px #2CB77033;
    }
    .admin-card input, .admin-card label {
      color: #194341 !important;
    }
    .admin-card input {
      background: transparent;
    }
    .admin-card label {
      color: #2CB770 !important;
    }
    #errorMsg {
      color: #FF0000;
    }
    #forgotPasswordLink {
      color: #FFCD28;
    }
    @media (max-width: 600px) {
      .admin-card { padding: 1.5rem !important; }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="admin-card bg-white/80 p-10 w-full max-w-md flex flex-col items-center">
    <div class="admin-logo text-3xl font-black text-alifTeal mb-6">ALIF Admin</div>
    <form id="loginForm" class="space-y-6 w-full">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
        <input type="text" id="username" class="admin-input w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none py-2 px-2 bg-transparent" required autocomplete="username">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input type="password" id="password" class="admin-input w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none py-2 px-2 bg-transparent" required autocomplete="current-password">
      </div>
      <button type="submit" class="admin-btn w-full bg-alifTeal text-white py-2 rounded-full hover:bg-alifYellow hover:text-alifTeal transition text-lg shadow">Login</button>
      <div class="text-center mt-2">
        <a href="#" id="forgotPasswordLink" class="text-alifYellow font-semibold hover:underline">Forgot Password?</a>
      </div>
    </form>
    <div id="errorMsg" class="text-red-600 mt-4 hidden text-center font-semibold"></div>
  </div>
    <div id="resetPasswordModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md relative">
        <button id="closeResetModal" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-2xl">&times;</button>
        <h2 class="text-xl font-bold mb-4 text-alifTeal">Reset Password</h2>
        <form id="resetPasswordForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <input type="text" id="reset_username" class="w-full border-b-2 border-alifTeal focus:outline-none py-2 px-2 bg-transparent" required autocomplete="username">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
            <input type="password" id="reset_newPassword" class="w-full border-b-2 border-alifTeal focus:outline-none py-2 px-2 bg-transparent" required autocomplete="new-password">
          </div>
          <button type="submit" class="w-full bg-alifTeal text-white py-2 rounded-full hover:bg-alifYellow hover:text-alifTeal transition text-lg shadow">Reset Password</button>
        </form>
        <div id="resetMsg" class="mt-4 text-center font-semibold"></div>
      </div>
    </div>
  </div>
  <script>
    // Handle login form submission
    document.getElementById('loginForm').onsubmit = async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('hidden');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success && data.token) {
          localStorage.setItem('token', data.token);
          window.location.href = 'admin-dashboard.html';
        } else {
          errorMsg.textContent = data.message || 'Login failed';
          errorMsg.classList.remove('hidden');
        }
      } catch {
        errorMsg.textContent = 'Network error';
        errorMsg.classList.remove('hidden');
      }
    };

    // Forgot Password Modal Logic
    document.getElementById('forgotPasswordLink').onclick = function(e) {
      e.preventDefault();
      document.getElementById('resetPasswordModal').classList.remove('hidden');
    };
    document.getElementById('closeResetModal').onclick = function() {
      document.getElementById('resetPasswordModal').classList.add('hidden');
      document.getElementById('resetMsg').textContent = '';
    };
    document.getElementById('resetPasswordForm').onsubmit = async function(e) {
      e.preventDefault();
      const username = document.getElementById('reset_username').value;
      const newPassword = document.getElementById('reset_newPassword').value;
      const resetMsg = document.getElementById('resetMsg');
      resetMsg.textContent = '';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, newPassword })
        });
        const data = await res.json();
        if (data.success) {
          resetMsg.textContent = 'Password reset successful! You can now log in.';
          resetMsg.className = 'text-green-600 mt-4 text-center font-semibold';
        } else {
          resetMsg.textContent = data.message || 'Reset failed';
          resetMsg.className = 'text-red-600 mt-4 text-center font-semibold';
        }
      } catch {
        resetMsg.textContent = 'Network error';
        resetMsg.className = 'text-red-600 mt-4 text-center font-semibold';
      }
    };
  </script>
  <script>
    // Automatically redirect to dashboard
    window.location.href = '/admin-dashboard.html';
  </script>
</body>
</html>
