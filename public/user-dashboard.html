<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <header class="bg-white shadow-md py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-alifTeal">User Dashboard</h1>
            <button class="bg-red-500 text-white px-4 py-2 rounded-md" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <section id="status-section" class="mb-8">
            <h2 class="text-xl font-bold text-gray-800">Scholarship Status</h2>
            <div id="status-message" class="mt-4 p-4 bg-gray-50 border rounded-md shadow-sm">
                <!-- Status will be dynamically updated -->
            </div>
        </section>

        <section id="disbursement-section" class="hidden">
            <h2 class="text-xl font-bold text-gray-800">Disbursement Details</h2>
            <div id="disbursement-info" class="mt-4 p-4 bg-gray-50 border rounded-md shadow-sm">
                <!-- Disbursement details will be dynamically updated -->
            </div>
        </section>
    </main>

    <script>
        // Fetch user data and update the dashboard
        async function fetchUserData() {
            try {
                const response = await fetch('/api/user/dashboard');
                const data = await response.json();

                const statusMessage = document.getElementById('status-message');
                const disbursementSection = document.getElementById('disbursement-section');

                if (data.status === 'Approved') {
                    statusMessage.textContent = 'Congratulations! Your scholarship has been approved.';
                    disbursementSection.classList.remove('hidden');
                } else if (data.status === 'Declined') {
                    statusMessage.textContent = 'We regret to inform you that your scholarship application has been declined.';
                    setTimeout(() => {
                        document.body.innerHTML = '<h1 class="text-center text-3xl font-bold text-red-500 mt-20">Access Denied</h1>';
                    }, 3000);
                } else {
                    statusMessage.textContent = 'Your scholarship application is still under review.';
                }

                // Update disbursement info if available
                if (data.disbursement) {
                    const disbursementInfo = document.getElementById('disbursement-info');
                    disbursementInfo.textContent = `Next disbursement: ${data.disbursement.nextDate}`;
                }
            } catch (error) {
                console.error('Error fetching user data:', error);
            }
        }

        // Logout function
        function logout() {
            // Clear session and redirect to login
            window.location.href = '/login.html';
        }

        // Initialize dashboard
        fetchUserData();
    </script>
</body>
</html>
