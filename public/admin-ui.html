<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Post Management - ALIF Foundation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto py-8">
    <header class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-black text-alifTeal">Manage Posts</h1>
      <button id="logoutBtn" class="bg-alifYellow text-alifTeal font-bold py-2 px-4 rounded hover:bg-yellow-400">Logout</button>
    </header>
    <!-- Create Post Card -->
    <div class="bg-white rounded-lg shadow p-6 mb-8">
      <h2 class="text-xl font-bold mb-4 text-alifTeal">Create New Post</h2>
      <form id="createPostForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block mb-1 font-medium">Title</label>
          <input type="text" id="title" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" required>
        </div>
        <div>
          <label class="block mb-1 font-medium">Category</label>
          <select id="category" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" required>
            <option value="news">News</option>
            <option value="events">Events</option>
            <option value="scholarships">Scholarships</option>
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="block mb-1 font-medium">Description</label>
          <input type="text" id="description" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" required>
        </div>
        <div class="md:col-span-2">
          <label class="block mb-1 font-medium">Content Body</label>
          <textarea id="content_body" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" rows="3" required></textarea>
        </div>
        <div>
          <label class="block mb-1 font-medium">Image</label>
          <input type="file" id="image" accept="image/*" class="w-full">
        </div>
        <div class="flex items-end">
          <button type="submit" class="bg-alifTeal text-white font-bold py-2 px-6 rounded hover:bg-alifYellow transition">Create Post</button>
        </div>
      </form>
      <div id="toast" class="hidden mt-4 p-2 rounded text-white"></div>
    </div>
    <!-- Posts Table -->
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-xl font-bold mb-4 text-alifTeal">All Posts</h2>
      <div class="overflow-x-auto">
        <table class="min-w-full">
          <thead>
            <tr class="bg-gray-100">
              <th class="py-2 px-4 text-left">Title</th>
              <th class="py-2 px-4 text-left">Category</th>
              <th class="py-2 px-4 text-left">Created</th>
              <th class="py-2 px-4 text-left">Actions</th>
            </tr>
          </thead>
          <tbody id="postsTable"></tbody>
        </table>
      </div>
    </div>
    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-lg relative">
        <button id="closeEditModal" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-2xl">&times;</button>
        <h2 class="text-xl font-bold mb-4 text-alifTeal">Edit Post</h2>
        <form id="editPostForm" class="space-y-4">
          <input type="hidden" id="edit_id">
          <div>
            <label class="block mb-1 font-medium">Title</label>
            <input type="text" id="edit_title" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" required>
          </div>
          <div>
            <label class="block mb-1 font-medium">Category</label>
            <select id="edit_category" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" required>
              <option value="news">News</option>
              <option value="events">Events</option>
              <option value="scholarships">Scholarships</option>
            </select>
          </div>
          <div>
            <label class="block mb-1 font-medium">Description</label>
            <input type="text" id="edit_description" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" required>
          </div>
          <div>
            <label class="block mb-1 font-medium">Content Body</label>
            <textarea id="edit_content_body" class="w-full border-b-2 border-alifTeal focus:outline-none py-1" rows="3" required></textarea>
          </div>
          <div>
            <label class="block mb-1 font-medium">Image</label>
            <input type="file" id="edit_image" accept="image/*" class="w-full">
          </div>
          <button type="submit" class="bg-alifTeal text-white font-bold py-2 px-6 rounded hover:bg-alifYellow transition">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    // Redirect if not authenticated
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'admin-dashboard.html';

    // Logout
    document.getElementById('logoutBtn').onclick = function() {
      localStorage.removeItem('token');
      window.location.href = 'admin-dashboard.html';
    };

    // Toast Notification
    function showToast(msg, success = true) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `mt-4 p-2 rounded text-white ${success ? 'bg-green-600' : 'bg-red-600'}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    // Fetch and Render Posts
    async function fetchPosts() {
      const res = await fetch('/api/posts', {
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      const posts = data.data || [];
      const table = document.getElementById('postsTable');
      table.innerHTML = '';
      posts.forEach(post => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="py-2 px-4">${post.title}</td>
          <td class="py-2 px-4">${post.category}</td>
          <td class="py-2 px-4">${new Date(post.created_at).toLocaleString()}</td>
          <td class="py-2 px-4">
            <button class="text-blue-600 hover:underline mr-2" onclick="openEditModal('${post.id}')">Edit</button>
            <button class="text-red-600 hover:underline" onclick="deletePost('${post.id}')">Delete</button>
          </td>
        `;
        table.appendChild(tr);
      });
    }
    fetchPosts();

    // Create Post
    document.getElementById('createPostForm').onsubmit = async function(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData();
      formData.append('title', form.title.value);
      formData.append('category', form.category.value);
      formData.append('description', form.description.value);
      formData.append('content_body', form.content_body.value);
      if (form.image.files[0]) formData.append('image', form.image.files[0]);
      try {
        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token },
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          showToast('Post created!');
          form.reset();
          fetchPosts();
        } else {
          showToast(data.message || 'Failed to create post', false);
        }
      } catch {
        showToast('Failed to create post', false);
      }
    };

    // Edit Post Modal Logic
    window.openEditModal = async function(id) {
      // Fetch post data
      const res = await fetch(`/api/posts/${id}`, {
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      if (!data.success) return showToast('Failed to load post', false);
      const post = data.data;
      document.getElementById('edit_id').value = post.id;
      document.getElementById('edit_title').value = post.title;
      document.getElementById('edit_category').value = post.category;
      document.getElementById('edit_description').value = post.description;
      document.getElementById('edit_content_body').value = post.content_body;
      document.getElementById('editModal').classList.remove('hidden');
    };
    document.getElementById('closeEditModal').onclick = function() {
      document.getElementById('editModal').classList.add('hidden');
    };

    // Save Edit
    document.getElementById('editPostForm').onsubmit = async function(e) {
      e.preventDefault();
      const id = document.getElementById('edit_id').value;
      const formData = new FormData();
      formData.append('title', document.getElementById('edit_title').value);
      formData.append('category', document.getElementById('edit_category').value);
      formData.append('description', document.getElementById('edit_description').value);
      formData.append('content_body', document.getElementById('edit_content_body').value);
      const image = document.getElementById('edit_image').files[0];
      if (image) formData.append('image', image);
      try {
        const res = await fetch(`/api/posts/${id}`, {
          method: 'PUT',
          headers: { Authorization: 'Bearer ' + token },
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          showToast('Post updated!');
          document.getElementById('editModal').classList.add('hidden');
          fetchPosts();
        } else {
          showToast(data.message || 'Failed to update post', false);
        }
      } catch {
        showToast('Failed to update post', false);
      }
    };

    // Delete Post
    window.deletePost = async function(id) {
      if (!confirm('Are you sure you want to delete this post?')) return;
      try {
        const res = await fetch(`/api/posts/${id}`, {
          method: 'DELETE',
          headers: { Authorization: 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
          showToast('Post deleted!');
          fetchPosts();
        } else {
          showToast(data.message || 'Failed to delete post', false);
        }
      } catch {
        showToast('Failed to delete post', false);
      }
    };
  </script>
</body>
</html>
