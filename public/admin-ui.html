<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-[#194341] text-white flex flex-col">
            <div class="p-4 text-2xl font-bold">ALIF Admin</div>
            <nav class="flex-1">
                <ul class="space-y-2">
                    <li><a href="#" class="block px-4 py-2 hover:bg-[#2CB770] rounded">Dashboard</a></li>
                    <li><a href="#" class="block px-4 py-2 hover:bg-[#2CB770] rounded">Events</a></li>
                    <li><a href="#" class="block px-4 py-2 hover:bg-[#2CB770] rounded">Scholarships</a></li>
                    <li><a href="#" class="block px-4 py-2 hover:bg-[#2CB770] rounded">Team</a></li>
                    <li><a href="#" class="block px-4 py-2 hover:bg-[#2CB770] rounded">Settings</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Panel -->
        <main class="flex-1 p-6">
            <header class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-semibold">Dashboard</h1>
                <button class="bg-[#FFCD28] text-black px-4 py-2 rounded">Live Preview</button>
            </header>

            <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Quick Action Cards -->
                <div class="bg-white p-4 rounded-2xl shadow">
                    <h2 class="text-xl font-semibold mb-2">Add New Event</h2>
                    <p class="text-gray-600">Quickly add a new event to the system.</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow">
                    <h2 class="text-xl font-semibold mb-2">Update Scholarship Deadline</h2>
                    <p class="text-gray-600">Modify the deadline for scholarships.</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow">
                    <h2 class="text-xl font-semibold mb-2">Manage Team</h2>
                    <p class="text-gray-600">Edit team member details.</p>
                </div>
            </section>

            <!-- Page Editor Module -->
            <section class="mt-6">
                <div id="page-editor">
                    <!-- Include PageEditor Module -->
                    <script src="modules/PageEditor.html"></script>
                </div>
            </section>

            <!-- Page Editor Section -->
            <section class="mt-6">
                <div class="bg-white p-6 rounded-2xl shadow">
                    <h2 class="text-2xl font-semibold mb-4">Page Editor</h2>

                    <!-- Page Selector -->
                    <div class="mb-4">
                        <label for="page" class="block text-gray-700 font-medium mb-2">Select Page:</label>
                        <select id="page" class="w-full border-gray-300 rounded px-4 py-2">
                            <option value="about">About</option>
                            <option value="scholarship">Scholarship</option>
                            <option value="programs">Programs</option>
                        </select>
                    </div>

                    <!-- Content Editor -->
                    <div class="mb-4">
                        <label for="content" class="block text-gray-700 font-medium mb-2">Edit Content:</label>
                        <textarea id="content" rows="10" class="w-full border-gray-300 rounded px-4 py-2" placeholder="Enter content here..."></textarea>
                    </div>

                    <!-- Image Upload -->
                    <div class="mb-4">
                        <label for="image" class="block text-gray-700 font-medium mb-2">Upload Image:</label>
                        <input type="file" id="image" class="w-full border-gray-300 rounded px-4 py-2">
                    </div>

                    <!-- Actions -->
                    <div class="flex justify-between items-center">
                        <button class="bg-[#FFCD28] text-black px-4 py-2 rounded">Live Preview</button>
                        <button id="savePage" class="bg-[#2CB770] text-white px-4 py-2 rounded">Save Changes</button>
                    </div>
                </div>
            </section>

            <script>
                document.getElementById('savePage').addEventListener('click', async () => {
                    const page = document.getElementById('page').value;
                    const content = document.getElementById('content').value;
                    const imageInput = document.getElementById('image');
                    const formData = new FormData();

                    formData.append('page', page);
                    formData.append('content', content);
                    if (imageInput.files[0]) {
                        formData.append('image', imageInput.files[0]);
                    }

                    try {
                        const response = await fetch(`/api/pages/${page}`, {
                            method: 'PUT',
                            body: formData
                        });

                        if (response.ok) {
                            alert('Page updated successfully!');
                        } else {
                            alert('Failed to update page.');
                        }
                    } catch (error) {
                        console.error('Error saving page:', error);
                        alert('An error occurred while saving the page.');
                    }
                });
            </script>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Example: Fetch and display dashboard stats
            fetch('/api/dashboard/stats')
                .then(response => response.json())
                .then(data => {
                    console.log('Dashboard stats:', data);
                    // Update UI with stats (e.g., total events, scholarships, etc.)
                })
                .catch(error => console.error('Error fetching dashboard stats:', error));

            // Add event listeners for quick action cards
            document.querySelectorAll('.quick-action').forEach(card => {
                card.addEventListener('click', () => {
                    alert('Quick action clicked: ' + card.querySelector('h2').textContent);
                });
            });

            // Page Editor Module
            const pageEditor = document.getElementById('page-editor');
            if (pageEditor) {
                console.log('Page Editor Module Loaded');
                // Add functionality to load and save page content
            }
        });
    </script>
</body>
</html>
