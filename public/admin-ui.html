<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin UI Dashboard - ALIF Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F9FAFB;
        }
        .post-card {
            border: 2px solid #E5E7EB;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .post-card:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Admin UI Header -->
    <header class="bg-alifTeal text-white py-4">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-2xl font-black">Admin UI Dashboard</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Add New Post -->
            <div class="bg-white shadow-lg rounded-lg p-6">
                <h2 class="text-xl font-bold text-alifTeal mb-4">Add New Post</h2>
                <form class="space-y-4">
                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700">Post Title</label>
                        <input type="text" id="title" class="w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none">
                    </div>
                    <div>
                        <label for="content" class="block text-sm font-medium text-gray-700">Post Content</label>
                        <textarea id="content" rows="4" class="w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none"></textarea>
                    </div>
                    <div>
                        <label for="image" class="block text-sm font-medium text-gray-700">Upload Image</label>
                        <input type="file" id="image" class="w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none">
                    </div>
                    <div>
                        <label for="page" class="block text-sm font-medium text-gray-700">Select Page</label>
                        <select id="page" class="w-full border-b-2 border-gray-300 focus:border-alifGreen focus:outline-none">
                            <option value="index">Homepage</option>
                            <option value="about">About Us</option>
                            <option value="scholarship">Scholarship</option>
                            <option value="events">Events</option>
                            <option value="contact">Contact</option>
                        </select>
                    </div>
                    <button type="submit" class="bg-alifTeal text-white px-6 py-3 rounded-md hover:bg-alifYellow transition">Add Post</button>
                </form>
            </div>

            <!-- Manage Existing Posts -->
            <div class="bg-white shadow-lg rounded-lg p-6 col-span-2">
                <h2 class="text-xl font-bold text-alifTeal mb-4">Manage Existing Posts</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="post-card bg-white rounded-lg p-4">
                        <img src="sample-image.jpg" alt="Post Image" class="w-full h-32 object-cover rounded-md mb-4">
                        <h3 class="text-lg font-bold text-alifTeal">Sample Post Title</h3>
                        <p class="text-sm text-gray-500">March 13, 2026</p>
                        <div class="mt-4 flex justify-between">
                            <button class="text-blue-500 hover:underline">Edit</button>
                            <button class="text-red-500 hover:underline">Delete</button>
                        </div>
                    </div>
                    <!-- Additional post cards can be dynamically added here -->
                </div>
            </div>
        </div>
    </main>
</body>
</html>
