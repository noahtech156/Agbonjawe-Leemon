<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIF Foundation Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="relative h-screen">
        <!-- Navbar (fixed, full width) -->
        <header class="bg-[#194341] text-white py-4 px-6 flex items-center justify-between shadow-md fixed top-0 left-0 w-full z-30" style="background-color:#14302B;">
            <div class="flex items-center">
                <img src="alif-logo.png" alt="ALIF Foundation Logo" class="h-8 w-auto mr-2" />
                <span class="text-lg font-bold">ALIF Foundation Admin Panel</span>
            </div>
            <button id="sidebarToggle" class="ml-4 p-2 rounded bg-[#FFCD28] text-black hover:bg-yellow-300 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </header>
        <!-- Sidebar (overlay, hidden by default) -->
        <aside id="adminSidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-50 text-[#194341] flex flex-col py-8 px-4 space-y-6 z-40 shadow-lg transform -translate-x-full transition-transform duration-200">
            <div class="flex items-center mb-8">
                <img src="alif-logo.png" alt="ALIF Foundation Logo" class="h-10 w-auto mr-2" />
                <span class="text-xl font-bold">ALIF Admin</span>
            </div>
            <nav class="flex flex-col gap-2">
                <button class="sidebar-link text-left py-2 px-4 rounded hover:bg-[#225c53] transition" data-segment="applications">Scholarship Applications</button>
                <button class="sidebar-link text-left py-2 px-4 rounded hover:bg-[#225c53] transition" data-segment="disbursements">Disbursement Forms</button>
                <button class="sidebar-link text-left py-2 px-4 rounded hover:bg-[#225c53] transition" data-segment="history">Disbursement History</button>
            </nav>
            <div class="flex-grow"></div>
            <button id="logoutBtn" class="bg-red-500 px-4 py-2 rounded font-bold hover:bg-red-600">Logout</button>
        </aside>
        <!-- Overlay for sidebar -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-30 z-30 hidden"></div>
        <!-- Main Content -->
        <div class="flex flex-col h-full pt-20">
            <main class="flex-1 overflow-y-auto p-6 bg-gray-100">
                <!-- Scholarship Applications -->
                <section id="segment-applications" class="segment">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold">Scholarship Applications</h2>
                        <button id="exportApplicationsBtn" class="bg-[#FFCD28] text-black font-bold px-4 py-2 rounded shadow hover:bg-yellow-300 transition">Export as CSV</button>
                    </div>
                    <div class="bg-white rounded shadow p-4 overflow-x-auto">
                        <table id="applicationsTable" class="min-w-full table-auto border-collapse">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th class="px-3 py-2 border">Full Name</th>
                                    <th class="px-3 py-2 border">Email</th>
                                    <th class="px-3 py-2 border">Status</th>
                                    <th class="px-3 py-2 border">Documents</th>
                                    <th class="px-3 py-2 border">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="applicationsTableBody"></tbody>
                        </table>
                    </div>
                </section>
                <!-- Disbursement Forms -->
                <section id="segment-disbursements" class="segment hidden">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold">Disbursement Forms</h2>
                        <button id="exportDisbursementsBtn" class="bg-[#FFCD28] text-black font-bold px-4 py-2 rounded shadow hover:bg-yellow-300 transition">Export as CSV</button>
                    </div>
                    <div class="bg-white rounded shadow p-4 overflow-x-auto">
                        <table id="disbursementFormsTable" class="min-w-full table-auto border-collapse">
                            <thead>
                                <tr class="bg-gray-100">
                                    <th class="px-3 py-2 border">User ID</th>
                                    <th class="px-3 py-2 border">Full Name</th>
                                    <th class="px-3 py-2 border">School Website Link</th>
                                    <th class="px-3 py-2 border">Student ID</th>
                                    <th class="px-3 py-2 border">Password</th>
                                    <th class="px-3 py-2 border">Account Number</th>
                                    <th class="px-3 py-2 border">Bank Name</th>
                                    <th class="px-3 py-2 border">Account Name</th>
                                    <th class="px-3 py-2 border">Amount</th>
                                    <th class="px-3 py-2 border">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="disbursementFormsTableBody"></tbody>
                        </table>
                    </div>
                </section>
                <!-- Disbursement History -->
                <section id="segment-history" class="segment hidden">
                    <h2 class="text-xl font-bold mb-4">Disbursement History</h2>
                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 mb-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="openCommentaryToggle" class="form-checkbox h-5 w-5 text-green-600">
                            <span class="text-sm font-medium">Open Commentary (Allow user feedback)</span>
                        </label>
                    </div>
                    <div id="disbursementHistoryList" class="bg-white rounded shadow p-4 overflow-x-auto"></div>
                </section>
            </main>
        </div>
    </div>
    <!-- Profile Modal -->
    <div id="profileModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-lg max-w-lg w-full p-6 relative">
            <button id="closeProfileModal" class="absolute top-2 right-2 text-gray-500 hover:text-gray-700">&times;</button>
            <div id="profileModalContent"></div>
        </div>
    </div>
    <script src="admin.js"></script>
    <script>
    // Commentary toggle state (simulate backend with localStorage for now)
    const openCommentaryToggle = document.getElementById('openCommentaryToggle');
    openCommentaryToggle.checked = localStorage.getItem('openCommentary') === 'true';
    openCommentaryToggle.addEventListener('change', function() {
        localStorage.setItem('openCommentary', openCommentaryToggle.checked);
    });
    </script>
    <script>
    // Sidebar toggle logic
    const sidebar = document.getElementById('adminSidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    function openSidebar() {
        sidebar.classList.remove('-translate-x-full');
        sidebarOverlay.classList.remove('hidden');
    }
    function closeSidebar() {
        sidebar.classList.add('-translate-x-full');
        sidebarOverlay.classList.add('hidden');
    }
    sidebarToggle.addEventListener('click', openSidebar);
    sidebarOverlay.addEventListener('click', closeSidebar);
    // Close sidebar on nav click (mobile UX)
    document.querySelectorAll('.sidebar-link').forEach(btn => {
        btn.addEventListener('click', closeSidebar);
    });
    </script>
</body>
</html>
