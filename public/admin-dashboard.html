<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ALIF Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F0FDF4;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Admin Dashboard -->
    <header class="bg-alifTeal text-white py-4">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-2xl font-black">Welcome to the Admin Dashboard</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Admin UI Dashboard -->
            <div class="bg-white shadow-lg rounded-lg p-6">
                <h2 class="text-xl font-bold text-alifTeal mb-4">Admin UI Dashboard</h2>
                <p class="text-gray-700 mb-4">Edit and add posts to pages, upload images, and manage content displayed on the frontend.</p>
                <a href="#" class="bg-alifYellow text-alifTeal px-6 py-3 rounded-md hover:bg-alifGreen transition">Go to Admin UI</a>
            </div>

            <!-- Webflow Management -->
            <div class="bg-white shadow-lg rounded-lg p-6">
                <h2 class="text-xl font-bold text-alifTeal mb-4">Webflow Management</h2>
                <p class="text-gray-700 mb-4">Manage all mails, chats, and the portal for future enhancements.</p>
                <a href="#" class="bg-alifYellow text-alifTeal px-6 py-3 rounded-md hover:bg-alifGreen transition">Go to Webflow Management</a>
            </div>
        </div>
    </main>
</body>
</html>
